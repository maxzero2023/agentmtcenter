<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TM">
  <title>TM Dispatch</title>
  <style>
    * { box-sizing: border-box; }
    body { background: #FAFBFC; color: #111827; font-family: system-ui; margin: 0; padding: env(safe-area-inset-top, 20px) 24px 24px; min-height: 100vh; min-height: 100dvh; }
    h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 4px; }
    .sub { color: #9CA3AF; font-size: 0.8rem; font-style: italic; font-family: Georgia, serif; }
    h2 { font-size: 0.85rem; color: #6B7280; margin: 1.5rem 0 0.5rem; font-weight: 600; letter-spacing: 0.5px; }
    .btn { display: block; width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-size: 0.95rem; text-align: center; text-decoration: none; cursor: pointer; font-weight: 600; }
    .primary { background: #4A96C4; color: white; box-shadow: 0 4px 16px rgba(74,150,196,0.2); }
    .secondary { background: #F3F4F6; color: #374151; border: 1px solid #E5E7EB; }
    input { width: 100%; padding: 12px 14px; background: #FFFFFF; border: 1px solid #E5E7EB; border-radius: 10px; color: #111827; font-size: 0.875rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    input:focus { outline: none; border-color: #4A96C4; box-shadow: 0 0 0 2px rgba(74,150,196,0.15); }
    input::placeholder { color: #D1D5DB; }
    .hint { color: #9CA3AF; font-size: 0.7rem; margin: 4px 0; }
    .card { background: #FFFFFF; border: 1px solid #E5E7EB; padding: 14px; border-radius: 10px; margin: 8px 0; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
    .card b { color: #4A96C4; }
    .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 0.7rem; background: #F3F4F6; padding: 8px 10px; border-radius: 8px; word-break: break-all; margin: 6px 0; display: block; color: #374151; border: 1px solid #E5E7EB; }
    #status { color: #3B9B6A; margin: 8px 0; display: none; font-family: ui-monospace, monospace; font-size: 0.75rem; }
    #status.error { color: #DC2626; }
    .divider { border-top: 1px solid #E5E7EB; margin: 1.5rem 0; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #E5E7EB; border-top-color: #4A96C4; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>TM Dispatch</h1>
  <p class="sub">Agent Dispatch Center</p>

  <h2>TOKEN</h2>
  <input id="tokenInput" type="password" placeholder="Server Secret Token">
  <p class="hint">Saved locally, never sent to third parties</p>

  <h2>CONNECT</h2>
  <a class="btn primary" id="goBtn" href="#">
    <span class="spinner"></span> Resolving...
  </a>
  <p id="status"></p>

  <div class="card">
    <b>Add to Home Screen:</b><br>
    Safari Share → "Add to Home Screen" → Name "TM"<br>
    <span style="color:#9CA3AF; font-size:0.7rem;">Opens directly to latest server URL</span>
  </div>

  <div class="divider"></div>
  <p style="color:#9CA3AF; font-size:0.65rem; text-align:center;">DNS: maxthjp.duckdns.org · Auto-resolves tunnel URL</p>

  <script>
    const STORAGE_KEY = 'tm-install-token';
    const tokenInput = document.getElementById('tokenInput');
    const btn = document.getElementById('goBtn');
    const status = document.getElementById('status');

    // Restore saved token
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) tokenInput.value = saved;
    tokenInput.addEventListener('input', () => {
      localStorage.setItem(STORAGE_KEY, tokenInput.value);
    });

    let resolvedUrl = null;

    async function resolve() {
      try {
        const res = await fetch('https://dns.google/resolve?name=maxthjp.duckdns.org&type=TXT');
        const data = await res.json();
        const txt = data.Answer?.find(a => a.type === 16);
        if (txt) {
          const tunnelUrl = txt.data.replace(/"/g, '');
          if (tunnelUrl.startsWith('https://')) {
            resolvedUrl = tunnelUrl;
            updateButton();
            status.textContent = 'Online: ' + tunnelUrl;
            status.style.display = 'block';
            status.className = '';

            // Standalone mode: auto-redirect
            if (window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches) {
              const token = tokenInput.value || saved || '';
              if (token) {
                // Use window.location.replace to avoid back-button issues
                window.location.replace(tunnelUrl + '#token=' + encodeURIComponent(token));
              }
            }
          }
        } else {
          btn.textContent = 'Server Offline';
          btn.style.background = '#DC2626';
          status.textContent = 'No tunnel URL found in DNS';
          status.className = 'error';
          status.style.display = 'block';
        }
      } catch (e) {
        btn.textContent = 'DNS Error';
        btn.style.background = '#DC2626';
        status.textContent = 'Failed: ' + e.message;
        status.className = 'error';
        status.style.display = 'block';
      }
    }

    function updateButton() {
      if (!resolvedUrl) return;
      const token = tokenInput.value || localStorage.getItem(STORAGE_KEY) || '';
      const target = token ? resolvedUrl + '#token=' + encodeURIComponent(token) : resolvedUrl;
      btn.href = target;
      btn.textContent = 'Open TM Dispatch';
      btn.style.background = '#4A96C4';
    }

    btn.onclick = () => {
      localStorage.setItem(STORAGE_KEY, tokenInput.value);
      updateButton();
    };

    tokenInput.addEventListener('change', updateButton);
    resolve();
  </script>
</body>
</html>
